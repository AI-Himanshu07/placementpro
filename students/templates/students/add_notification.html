{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

<h3>Add Notification</h3>

<form method="post">
    {% csrf_token %}

    <textarea name="message" class="form-control mb-3"
              placeholder="Enter message..." required></textarea>

    <button class="btn btn-primary">Send Notification</button>
</form>

</div>

{% endblock %}
