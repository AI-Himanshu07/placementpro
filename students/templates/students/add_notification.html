{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <h3>🔔 Send Notification</h3>

    <form method="POST">
        {% csrf_token %}

        <textarea name="message"
                  class="form-control mb-3"
                  placeholder="Write notification..."
                  required></textarea>

        <button class="btn btn-dark">Send</button>
    </form>
</div>

{% endblock %}
