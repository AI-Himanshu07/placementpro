{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

<a href="javascript:history.back()" class="btn btn-outline-dark mb-3">
⬅ Back
</a>

<h3 class="mb-4">🔔 Notifications</h3>

<div class="card p-4 shadow-lg"
     style="background: linear-gradient(135deg,#e0f2fe,#7dd3fc); border-radius:20px;">

{% for note in notifications %}

<div class="p-3 mb-3 rounded shadow-sm"
     style="background:white;
            border-left:6px solid #0ea5e9;">

<p class="mb-1">{{ note.message }}</p>
<small class="text-muted">{{ note.created_at }}</small>

{% if user.is_superuser %}
<div class="mt-2">
<a href="/students/delete-notification/{{ note.id }}/"
   class="btn btn-danger btn-sm">
🗑 Delete
</a>
</div>
{% endif %}

</div>

{% empty %}
<p class="text-center text-muted">No notifications yet</p>
{% endfor %}

</div>

</div>

{% endblock %}
