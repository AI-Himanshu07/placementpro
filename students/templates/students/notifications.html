<div class="container mt-4">

<h3 class="mb-4">🔔 Manage Notifications</h3>

<div class="row">

{% for n in notifications %}
<div class="col-md-6">
<div class="card p-3 shadow-sm border-0 mb-3" style="background:#fef2f2;">

<h6>{{ n.title }}</h6>
<p class="text-muted">{{ n.message }}</p>

<a href="/delete-notification/{{ n.id }}/" class="btn btn-danger btn-sm">Delete</a>

</div>
</div>
{% endfor %}

</div>

</div>
