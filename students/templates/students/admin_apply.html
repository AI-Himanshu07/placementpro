{% extends 'base.html' %}
{% block content %}

<h3>Apply Student for Job</h3>

<form method="post">
{% csrf_token %}

<select name="student_id" class="form-control mb-3">
    {% for s in students %}
    <option value="{{ s.id }}">{{ s.name }} ({{ s.cgpa }})</option>
    {% endfor %}
</select>

<button class="btn btn-success">Apply</button>

</form>

{% endblock %}
