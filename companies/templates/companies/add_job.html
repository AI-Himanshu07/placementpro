{% extends 'base.html' %}
{% block content %}

<h2>Add Job</h2>

<form method="post">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Title" class="form-control mb-2">

    
    <select name="job_type" class="form-control mb-2">
        <option value="Full-Time">Full-Time</option>
        <option value="Part-Time">Part-Time</option>
    </select>

    <textarea name="description" placeholder="Description" class="form-control mb-2"></textarea>

    <!-- ✅ ADDED -->
    <input type="number" step="0.1" name="min_cgpa" placeholder="Min CGPA" class="form-control mb-2">

    <button class="btn btn-primary">Add Job</button>
</form>

{% endblock %}
