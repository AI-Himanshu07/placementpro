
<!DOCTYPE html>
<html>
<head>
    <title>Placement System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            margin: 40px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
        }

        .btn {
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            display: inline-block;
        }

        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #16a34a; color: white; }
        .btn-yellow { background: #facc15; color: black; }
        .btn-red { background: #ef4444; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #1e3a8a;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:hover {
            background: #f3f4f6;
        }

        .pagination {
            margin-top: 20px;
        }

        .search-box {
            margin-top: 15px;
        }

        input[type="text"] {
            padding: 6px;
            width: 200px;
        }

        button {
            padding: 6px 12px;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="card">
        {% block content %}
        {% endblock %}
    </div>
</div>

</body>
</html>
