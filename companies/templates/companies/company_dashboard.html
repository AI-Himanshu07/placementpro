{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">

<h2 class="mb-4">🏢 {{ company.name }} Dashboard</h2>

<!-- CARDS -->
<div class="row text-center g-4">

<div class="col-md-4">
<div class="card p-4 shadow-sm" style="background:#fff7ed;">
<h6 class="text-muted">📄 Applications</h6>
<h2>{{ total_apps|default:0 }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 shadow-sm" style="background:#ecfdf5;">
<h6 class="text-muted">✅ Selected</h6>
<h2>{{ selected|default:0 }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card p-4 shadow-sm" style="background:#fef2f2;">
<h6 class="text-muted">❌ Rejected</h6>
<h2>{{ rejected|default:0 }}</h2>
</div>
</div>

</div>

<!-- DATA -->
<div id="chartData"
     data-total="{{ total_apps|default:0 }}"
     data-selected="{{ selected|default:0 }}"
     data-rejected="{{ rejected|default:0 }}">
</div>

<!-- CHARTS -->
<div class="row mt-5 g-4">

<div class="col-md-6">
<div class="card p-3 shadow-sm">
<h6 class="text-center">📊 Applications Overview</h6>
<canvas id="barChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow-sm">
<h6 class="text-center">📈 Selection Ratio</h6>
<canvas id="pieChart"></canvas>
</div>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const dataDiv = document.getElementById("chartData");

const total = parseInt(dataDiv.dataset.total) || 0;
const selected = parseInt(dataDiv.dataset.selected) || 0;
const rejected = parseInt(dataDiv.dataset.rejected) || 0;

// BAR
new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: ['Total', 'Selected', 'Rejected'],
        datasets: [{
            data: [total, selected, rejected],
            backgroundColor: ['#fb923c', '#16a34a', '#dc2626']
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
    }
});

// PIE
new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
        labels: ['Selected', 'Rejected'],
        datasets: [{
            data: [selected, rejected],
            backgroundColor: ['#16a34a', '#dc2626']
        }]
    },
    options: {
        cutout: '65%'
    }
});

</script>

{% endblock %}
