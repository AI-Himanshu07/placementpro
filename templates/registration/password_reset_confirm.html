{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
<div class="card p-4">

<h3>🔑 Set New Password</h3>

<form method="post">
{% csrf_token %}
<input type="password" name="new_password1" class="form-control mb-2" placeholder="New Password">
<input type="password" name="new_password2" class="form-control mb-3" placeholder="Confirm Password">

<button class="btn btn-success">Reset Password</button>
</form>

</div>
</div>

{% endblock %}
