<!DOCTYPE html>
<html>
<head>
<title>PlacementPro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* ☁️ TOP (65%) */
.bg-top {
    position: fixed;
    top: 0;
    width: 100%;
    height: 65%;
    background: #ffffff;
    z-index: -3;
}

/* CLOUD EFFECT */
.bg-top::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(147,197,253,0.25) 0 50px, transparent 51px),
        radial-gradient(circle at 60% 20%, rgba(147,197,253,0.2) 0 70px, transparent 71px),
        radial-gradient(circle at 80% 40%, rgba(147,197,253,0.18) 0 60px, transparent 61px);
}

/* 🔴 BOTTOM (35%) */
.bg-bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 35%;
    background: linear-gradient(135deg, #fecaca, #fb923c);
    z-index: -3;
}

/* 🌊 WAVE */
.wave {
    position: fixed;
    top: 60%;
    width: 100%;
    z-index: -2;
}

.wave svg {
    width: 100%;
    height: 140px;
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
    padding: 30px;
}

/* NAVBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
}

.logo {
    font-weight: bold;
    color: #ea580c;
}

</style>
</head>

<body>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#fb923c"
d="M0,160C200,220,400,100,700,160C1000,220,1200,140,1440,180L1440,320L0,320Z">
</path>
</svg>
</div>

<div class="topbar">
<div class="logo">🚀 PlacementPro</div>
</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
