<!DOCTYPE html>
<html>
<head>
<title>PlacementPro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* RESET */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}

/* 🌈 FULL BACKGROUND LAYERS */
.bg-top {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: #ffffff;
    z-index: -2;
}

.bg-bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(135deg, #fecaca, #fb923c);
    z-index: -2;
}

/* 🌊 WAVE DIVIDER */
.wave {
    position: fixed;
    top: 45%;
    left: 0;
    width: 100%;
    z-index: -1;
}

.wave svg {
    width: 100%;
    height: 100px;
    display: block;
}

/* NAVBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
}

.logo {
    font-weight: bold;
    font-size: 20px;
    color: #ea580c;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.role-badge {
    background: #fb923c;
    color: white;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 13px;
}

/* CONTENT MUST BE ABOVE BACKGROUND */
.content {
    position: relative;
    z-index: 2;
    padding: 30px;
}

/* CARDS */
.card {
    border-radius: 16px;
}

/* MENU */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
}

.menu-card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    text-align: center;
    transition: 0.3s;
    text-decoration: none;
    color: black;
}

.menu-card:hover {
    transform: translateY(-5px);
    background: #fb923c;
    color: white;
}

</style>
</head>

<body>

<!-- 🌈 BACKGROUND -->
<div class="bg-top"></div>
<div class="bg-bottom"></div>

<!-- 🌊 WAVE -->
<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#fb923c"
d="M0,192L80,186.7C160,181,320,171,480,181.3C640,192,800,224,960,218.7C1120,213,1280,171,1360,149.3L1440,128V320H0Z">
</path>
</svg>
</div>

<!-- NAVBAR -->
<div class="topbar">
    <div class="logo">🚀 PlacementPro</div>

    <div class="nav-right">
        {% if user.is_authenticated %}
            <span class="role-badge">Dashboard</span>
            <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
            <a href="/login/" class="btn btn-dark btn-sm">Login</a>
        {% endif %}
    </div>
</div>

<!-- CONTENT -->
<div class="content">

{% block content %}{% endblock %}

</div>

</body>
</html>
