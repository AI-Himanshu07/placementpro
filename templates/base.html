<!DOCTYPE html>
<html>
<head>
<title>PlacementPro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* TOP */
.bg-top {
    position: fixed;
    top: 0;
    width: 100%;
    height: 50%;
    background: #ffffff;
    z-index: -3;
}

/* BOTTOM */
.bg-bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(135deg, #d1fae5, #86efac);
    z-index: -3;
}

/* 🌊 REAL SEPARATOR (OVERLAPS BOTH) */
.wave {
    position: fixed;
    top: 48%; /* 🔥 THIS FIXES STRAIGHT LINE */
    width: 100%;
    z-index: -2;
}

.wave svg {
    width: 100%;
    height: 220px;
    display: block;
}

.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
}

.logo {
    font-weight: bold;
    color: #065f46;
}

.content {
    position: relative;
    z-index: 2;
    padding: 30px;
}

</style>
</head>

<body>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<!-- 🌊 WAVE (NOW ACTUAL SEPARATOR) -->
<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#86efac"
d="M0,160C200,280,400,60,700,160C1000,260,1200,100,1440,180L1440,320L0,320Z">
</path>
</svg>
</div>

<div class="topbar">
<div class="logo">🚀 PlacementPro</div>

<div>
{% if user.is_authenticated %}
<a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
{% else %}
<a href="/login/" class="btn btn-dark btn-sm">Login</a>
{% endif %}
</div>

</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
