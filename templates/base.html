<!DOCTYPE html>
<html>
<head>
<title>PlacementPro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* 🌤 TOP */
.bg-top {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70%;
    background: linear-gradient(to bottom, #f8fafc, #dbeafe);
    z-index: -3;
}

/* 🔵 BOTTOM */
.bg-bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
    z-index: -3;
}

/* 🌊 WAVE */
.wave {
    position: fixed;
    top: 60%;
    width: 100%;
    z-index: -2;
}

.wave svg {
    width: 100%;
    height: 180px;
}

/* SECOND WAVE */
.wave2 {
    position: fixed;
    top: 63%;
    width: 100%;
    opacity: 0.5;
    z-index: -1;
}

.wave2 svg {
    width: 100%;
    height: 160px;
}

/* KEEP STRUCTURE */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
}

.logo {
    font-weight: bold;
    color: #4f46e5;
}

.content {
    position: relative;
    z-index: 2;
    padding: 30px;
}

</style>
</head>

<body>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<!-- 🌊 WAVES -->
<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#c7d2fe"
d="M0,224C200,180,400,260,700,200C1000,140,1200,220,1440,200L1440,320L0,320Z">
</path>
</svg>
</div>

<div class="wave2">
<svg viewBox="0 0 1440 320">
<path fill="#a5b4fc"
d="M0,260C200,220,400,300,700,240C1000,180,1200,260,1440,240L1440,320L0,320Z">
</path>
</svg>
</div>

<!-- NAVBAR -->
<div class="topbar">

    <div class="logo">🚀 PlacementPro</div>

    <div>
        {% if user.is_authenticated %}
            <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
            <a href="/login/" class="btn btn-dark btn-sm">Login</a>
        {% endif %}
    </div>

</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
