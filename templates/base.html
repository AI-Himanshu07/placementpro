<!DOCTYPE html>
<html>
<head>
<title>PlacementPro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
}

/* TOP WHITE */
.bg-top {
    position: fixed;
    top: 0;
    width: 100%;
    height: 68%;
    background: #ffffff;
    z-index: -3;
}

/* LIGHT GREEN */
.bg-bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 42%;
    background: linear-gradient(135deg, #bbf7d0, #86efac);
    z-index: -3;
}

/* 🌊 STRONG CURVED WAVE (FIXED) */
.wave {
    position: fixed;
    top: 55%;
    width: 100%;
    z-index: -2;
}

.wave svg {
    width: 100%;
    height: 220px;
}

/* SECOND WAVE FOR DEPTH */
.wave2 {
    position: fixed;
    top: 58%;
    width: 100%;
    opacity: 0.6;
    z-index: -1;
}

.wave2 svg {
    width: 100%;
    height: 200px;
}

/* KEEP YOUR STRUCTURE */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
}

.logo {
    font-weight: bold;
    color: #059669;
}

.content {
    position: relative;
    z-index: 2;
    padding: 30px;
}

</style>
</head>

<body>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<!-- WAVE -->
<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#86efac"
d="M0,160C200,300,400,80,700,180C1000,280,1200,120,1440,200L1440,320L0,320Z">
</path>
</svg>
</div>

<div class="wave2">
<svg viewBox="0 0 1440 320">
<path fill="#4ade80"
d="M0,200C200,320,400,120,700,220C1000,300,1200,180,1440,240L1440,320L0,320Z">
</path>
</svg>
</div>

<!-- NAVBAR (UNCHANGED) -->
<div class="topbar">

<div class="logo">🚀 PlacementPro</div>

<div>
{% if user.is_authenticated %}
<a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
{% else %}
<a href="/login/" class="btn btn-dark btn-sm">Login</a>
{% endif %}
</div>

</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
