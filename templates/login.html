<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(to bottom, #ffffff, #e0f2fe);
}

/* 🌊 WAVE BACKGROUND */
.wave {
    position:absolute;
    bottom:0;
    width:100%;
    height:50%;
    background: linear-gradient(135deg, #89e1f9, #28cdfb);
    border-top-left-radius:50% 20%;
    border-top-right-radius:50% 20%;
    z-index: 0;
}

/* HOME BUTTON */
.home-btn {
    position:absolute;
    top:20px;
    left:20px;
    background:rgb(205, 143, 241);
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    z-index: 5;
}

/* WELCOME SCREEN */
.welcome {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    cursor:pointer;
    z-index: 2;
}

.welcome h1 {
    font-size:45px;
}

.welcome p {
    max-width:500px;
    color:#080808;
}

/* 🔥 LOGIN CARD */
.card {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:340px;
    padding:30px;
    border-radius:20px;
    z-index: 5;

    /* LIGHT RED */
    background: linear-gradient(135deg, #f57d7d, #f61d1d);

    box-shadow:0 25px 60px rgba(7, 7, 7, 0.3);

    z-index: 10; /* 🔥 FIX HIDDEN ISSUE */
    transition:0.5s;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:black;
    color:white;
    border:none;
    border-radius:8px;
}

/* LINKS */
.links {
    text-align:center;
    margin-top:10px;
}

.links a {
    display:block;
    color:black;
    text-decoration:none;
    margin-top:5px;
}

</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<div class="wave"></div>

<!-- ✅ WELCOME SCREEN -->
<div class="welcome" onclick="openLogin()">

<h1>🚀 PlacementPro</h1>

<p>
Welcome to PlacementPro — a smart platform where students apply for jobs,
companies hire talent, and admins manage the entire placement system.
</p>

<p><b>Click anywhere to login</b></p>

</div>

<!-- ✅ LOGIN CARD -->
<div class="card" id="card">

<h2>Login</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="links">
<a href="/password-reset/">Forgot Password?</a>
<a href="/students/register/">Create Account</a>
</div>

</div>

<script>

/* SHOW LOGIN */
function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("card").classList.add("active");
}

/* 3D EFFECT */
document.addEventListener("mousemove",(e)=>{
    const card=document.getElementById("card");

    if(!card.classList.contains("active")) return;

    let x=(window.innerWidth/2 - e.pageX)/40;
    let y=(window.innerHeight/2 - e.pageY)/40;

    card.style.transform =
    `translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
