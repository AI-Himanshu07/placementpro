<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
}

/* SAME BACKGROUND */
.bg-top {
    position: absolute;
    width: 100%;
    height: 68%;
    background: white;
}

.bg-bottom {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 45%;
    background: linear-gradient(135deg, #f87171, #ef4444);
}

/* WAVES */
.wave, .wave2 {
    position: absolute;
    width: 100%;
}

.wave { top: 55%; }
.wave2 { top: 58%; opacity: 0.6; }

/* WELCOME */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
    z-index:2;
}

.welcome h1 {
    font-size: 48px;
}

.click {
    color: #ef4444;
    font-weight: bold;
    margin-top: 15px;
}

/* 💎 PREMIUM CARD */
.card {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);

    width: 360px;
    padding: 30px;

    border-radius: 25px;

    background: linear-gradient(145deg, #fecaca, #f87171);

    box-shadow:
        0 40px 100px rgba(239,68,68,0.4),
        inset 0 0 30px rgba(255,255,255,0.4);

    transition: 0.4s;
}

.card.active {
    transform: translate(-50%, -50%) scale(1);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #dc2626;
    color: white;
    border: none;
    border-radius: 12px;
}

/* 3D EFFECT */
.card.active:hover {
    transform: translate(-50%, -50%) scale(1.02);
}

</style>
</head>

<body>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#f87171"
d="M0,160C200,260,400,80,700,160C1000,240,1200,120,1440,180L1440,320L0,320Z">
</path>
</svg>
</div>

<div class="wave2">
<svg viewBox="0 0 1440 320">
<path fill="#ef4444"
d="M0,200C200,300,400,120,700,200C1000,260,1200,180,1440,220L1440,320L0,320Z">
</path>
</svg>
</div>

<!-- WELCOME -->
<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>Manage placements smartly and efficiently</p>
<div class="click">Click anywhere to continue</div>
</div>

<!-- CARD -->
<div class="card" id="card">

<h2>Login</h2>

<form method="post">
{% csrf_token %}
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Login</button>
</form>

</div>

<script>

function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("card").classList.add("active");
}

/* REAL 3D FOLLOW */
document.addEventListener("mousemove",(e)=>{
    const card = document.getElementById("card");

    if(!card.classList.contains("active")) return;

    let x = (window.innerWidth/2 - e.pageX)/30;
    let y = (window.innerHeight/2 - e.pageY)/30;

    card.style.transform =
    `translate(-50%, -50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
