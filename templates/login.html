<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
}

/* BACKGROUND SAME AS BASE */
.bg-top {
    position: absolute;
    width: 100%;
    height: 50%;
    background: #ffffff;
}

.bg-bottom {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 50%;
    background: linear-gradient(135deg, #d1fae5, #86efac);
}

/* 🌊 WAVE */
.wave {
    position: absolute;
    top: 48%;
    width: 100%;
}

.wave svg {
    width: 100%;
    height: 220px;
}

/* HOME BUTTON */
.home-btn {
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
}

/* WELCOME */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
}

.welcome h1 {
    color: black;
}

.welcome p {
    color: #374151;
}

.click {
    margin-top:10px;
    color:black;
}

/* 💎 CARD (PREMIUM LOOK) */
.card {
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);

    width:340px;
    padding:30px;
    border-radius:22px;

    /* soft glass green */
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(15px);

    box-shadow:0 30px 80px rgba(0,0,0,0.25);

    transition:0.4s ease;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    background:white;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:#059669;
    color:white;
    border:none;
    border-radius:8px;
}

/* LINKS */
.links {
    text-align:center;
    margin-top:10px;
}

.links a {
    display:block;
    color:#065f46;
    text-decoration:none;
}

</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#86efac"
d="M0,160C200,280,400,60,700,160C1000,260,1200,100,1440,180L1440,320L0,320Z">
</path>
</svg>
</div>

<!-- WELCOME -->
<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>Manage placements easily</p>
<div class="click">Click anywhere to login</div>
</div>

<!-- CARD -->
<div class="card" id="card">

<h2>Login</h2>

<form method="post">
{% csrf_token %}
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<div class="links">
<a href="/password-reset/">Forgot Password?</a>
<a href="/students/register/">Create Account</a>
</div>

</div>

<script>

/* SHOW CARD */
function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("card").classList.add("active");
}

/* 🔥 FULL 3D MOVEMENT */
document.addEventListener("mousemove",(e)=>{
    const card = document.getElementById("card");

    if(!card.classList.contains("active")) return;

    let x = (window.innerWidth/2 - e.pageX) / 20;
    let y = (window.innerHeight/2 - e.pageY) / 20;

    card.style.transform =
    `translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
