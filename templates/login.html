<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
}

/* SAME BACKGROUND */
.bg-top {
    position: absolute;
    width: 100%;
    height: 70%;
    background: linear-gradient(to bottom, #f8fafc, #dbeafe);
}

.bg-bottom {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
}

.wave {
    position: absolute;
    top: 60%;
    width: 100%;
}

.wave2 {
    position: absolute;
    top: 63%;
    width: 100%;
    opacity: 0.5;
}

/* HOME BUTTON */
.home-btn {
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
}

/* WELCOME */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
    z-index:2;
}

.welcome h1 {
    font-size: 45px;
}

.click {
    color:#4f46e5;
    margin-top:10px;
}

/* CARD */
.card {
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:340px;
    padding:30px;
    border-radius:20px;
    background:white;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    transition:0.4s;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    background:#eef2ff;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
}

</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#c7d2fe"
d="M0,224C200,180,400,260,700,200C1000,140,1200,220,1440,200L1440,320L0,320Z">
</path>
</svg>
</div>

<div class="wave2">
<svg viewBox="0 0 1440 320">
<path fill="#a5b4fc"
d="M0,260C200,220,400,300,700,240C1000,180,1200,260,1440,240L1440,320L0,320Z">
</path>
</svg>
</div>

<!-- WELCOME -->
<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>Smart placement system for students & companies</p>
<div class="click">Click anywhere to continue</div>
</div>

<!-- CARD -->
<div class="card" id="card">

<h2>Login</h2>

<form method="post">
{% csrf_token %}
<input type="text" name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button type="submit">Login</button>
</form>

</div>

<script>

function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("card").classList.add("active");
}

/* 3D EFFECT */
document.addEventListener("mousemove",(e)=>{
    const card=document.getElementById("card");

    if(!card.classList.contains("active")) return;

    let x=(window.innerWidth/2 - e.pageX)/30;
    let y=(window.innerHeight/2 - e.pageY)/30;

    card.style.transform =
    `translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
