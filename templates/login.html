<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    background: linear-gradient(135deg, #fff7ed, #fb923c);
}

/* WELCOME */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    cursor:pointer;
}

.welcome h1 {
    font-size:50px;
}

/* CARD */
.card {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);

    width:340px;
    padding:30px;
    border-radius:20px;

    background: white;
    color:black;

    box-shadow: 0 20px 50px rgba(0,0,0,0.15);

    transition:0.4s;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background: rgba(255,255,255,0.2);
    color:white;
}

input::placeholder {
    color:#fca5a5;
}

/* BUTTON */
button {
    background: #ea580c;
    color: white;
}
/* LINKS */
.links {
    text-align:center;
    margin-top:10px;
}

.links a {
    display:block;
    color:#ffe4e6;
    font-size:14px;
    margin-top:5px;
    text-decoration:none;
}

/* HOME BTN */
.home-btn {
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<!-- WELCOME -->
<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>Welcome — Click to Login</p>
</div>

<!-- LOGIN -->
<div class="card" id="loginCard">

<h2>Login</h2>

<form method="post">
{% csrf_token %}

{% if messages %}
{% for message in messages %}
<p style="color:#ffd1d1;text-align:center;">{{ message }}</p>
{% endfor %}
{% endif %}

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<div class="links">
<a href="/password-reset/">Forgot Password?</a>
<a href="/students/register/">Create Account</a>
</div>

</div>

<script>

function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("loginCard").classList.add("active");
}

/* 3D EFFECT */
document.addEventListener("mousemove",(e)=>{
    const card=document.getElementById("loginCard");

    let x=(window.innerWidth/2 - e.pageX)/30;
    let y=(window.innerHeight/2 - e.pageY)/30;

    card.style.transform =
    `translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
