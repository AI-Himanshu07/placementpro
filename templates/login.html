<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
}

/* SAME BACKGROUND */
.bg-top {
    position: absolute;
    width: 100%;
    height: 68%;
    background: white;
}

.bg-bottom {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 42%;
    background: linear-gradient(135deg, #bbf7d0, #86efac);
}

.wave {
    position: absolute;
    top: 55%;
    width: 100%;
}

.wave2 {
    position: absolute;
    top: 58%;
    width: 100%;
    opacity: 0.6;
}

/* HOME BUTTON */
.home-btn {
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
}

/* WELCOME */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
}

/* CARD (NO WHITE — SOFT GREEN GLASS LOOK) */
.card {
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);

    width:340px;
    padding:30px;
    border-radius:22px;

    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(12px);

    box-shadow:0 25px 60px rgba(0,0,0,0.2);

    transition:0.4s;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    background:white;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:#059669;
    color:white;
    border:none;
    border-radius:8px;
}

/* LINKS (RESTORED) */
.links {
    text-align:center;
    margin-top:10px;
}

.links a {
    display:block;
    color:#065f46;
    font-size:14px;
    text-decoration:none;
}

</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#86efac"
d="M0,160C200,300,400,80,700,180C1000,280,1200,120,1440,200L1440,320L0,320Z">
</path>
</svg>
</div>

<div class="wave2">
<svg viewBox="0 0 1440 320">
<path fill="#4ade80"
d="M0,200C200,320,400,120,700,220C1000,300,1200,180,1440,240L1440,320L0,320Z">
</path>
</svg>
</div>

<!-- WELCOME -->
<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>Click anywhere to login</p>
</div>

<!-- CARD -->
<div class="card" id="card">

<h2>Login</h2>

<form method="post">
{% csrf_token %}
<input type="text" name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button type="submit">Login</button>
</form>

<div class="links">
<a href="/password-reset/">Forgot Password?</a>
<a href="/students/register/">Create Account</a>
</div>

</div>

<script>

function openLogin(){
document.querySelector(".welcome").style.display="none";
document.getElementById("card").classList.add("active");
}

document.addEventListener("mousemove",(e)=>{
const card=document.getElementById("card");

if(!card.classList.contains("active")) return;

let x=(window.innerWidth/2 - e.pageX)/30;
let y=(window.innerHeight/2 - e.pageY)/30;

card.style.transform =
`translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
