<!DOCTYPE html>
<html>
<head>
<title>PlacementPro Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    overflow: hidden;
    background: linear-gradient(135deg, #ffedd5, #fb923c);

}

/* DARK MODE */
body.dark {
    background: linear-gradient(135deg, #141e30, #243b55);
}

/* BACKGROUND CIRCLES */
.bg-shape {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    animation: float 6s infinite ease-in-out;
}

.bg1 { width:200px; height:200px; top:10%; left:10%; }
.bg2 { width:300px; height:300px; bottom:10%; right:10%; }

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

/* HERO */
.hero {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    cursor: pointer;
}

.hero h1 {
    font-size: 48px;
}

.hero p {
    font-size: 18px;
}

/* LOGIN CARD */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 340px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(20px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    transition: 0.5s;
}

.card.active {
    transform: translate(-50%, -50%) scale(1);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #ff512f, #dd2476);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* TOGGLE */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    font-size: 22px;
}
</style>
</head>

<body>

<!-- BACKGROUND SHAPES -->
<div class="bg-shape bg1"></div>
<div class="bg-shape bg2"></div>

<!-- DARK MODE -->
<a href="/" style="
position:absolute;
top:20px;
right:20px;
font-size:18px;
text-decoration:none;
background:white;
padding:8px 12px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
">
🏠 Home
</a>

<!-- HERO -->
<div class="hero" onclick="openLogin()">
<h1 style="font-size:50px;">🚀 PlacementPro</h1>

<p style="font-size:20px;">
Smart Placement Platform
</p>

<p style="color:#444; font-size:16px;">
Connecting students and opportunities with intelligent tracking.
<br>
Simple. Fast. Effective.
</p>
</div>

<!-- LOGIN CARD -->
<div class="card" id="loginCard">
    <h2>Login</h2>

    <form method="post">
    {% csrf_token %}

    {% if messages %}
        {% for message in messages %}
            <p style="color:red; text-align:center; margin:5px 0;">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>
</div>

<script>
  document.addEventListener("mousemove", (e) => {
    const card = document.getElementById("loginCard");

    let x = (window.innerWidth / 2 - e.pageX) / 25;
    let y = (window.innerHeight / 2 - e.pageY) / 25;

    card.style.transform =
        `translate(-50%, -50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

/* OPEN LOGIN */
function openLogin() {
    document.getElementById("loginCard").classList.add("active");
}

/* DARK MODE */
function toggleMode() {
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
