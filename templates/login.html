<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
    background: white;
}

/* ⚪ TOP WHITE */
.top {
    position: absolute;
    width: 100%;
    height: 65%;
    background: white;
}

/* 🔴 BOTTOM RED */
.bottom {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 35%;
    background: linear-gradient(135deg, #ef4444, #dc2626);
}

/* 🌊 WAVE */
.wave {
    position: absolute;
    top: 60%;
    width: 100%;
}

.wave svg {
    width: 100%;
    height: 140px;
}

/* 🚀 TITLE */
.title {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
}

.title h1 {
    font-size: 48px;
    color: #111827;
}

.title p {
    color: #374151;
    max-width: 420px;
    margin: auto;
}

/* CLICK TEXT */
.click-text {
    margin-top: 15px;
    color: #dc2626;
    font-weight: bold;
}

/* 🪟 CARD (FULL LIGHT RED) */
.card {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);

    width: 360px;
    padding: 30px;

    border-radius: 20px;

    background: linear-gradient(145deg, #fecaca, #f87171);

    box-shadow:
        0 30px 80px rgba(220,38,38,0.4),
        inset 0 0 20px rgba(255,255,255,0.3);

    transition: 0.4s;
}

/* SHOW CARD */
.card.active {
    transform: translate(-50%, -50%) scale(1);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.6);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #dc2626;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

/* LINKS */
.links {
    text-align: center;
    margin-top: 10px;
}

.links a {
    color: #7f1d1d;
    font-size: 13px;
    display: block;
}

/* WELCOME SCREEN */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    cursor:pointer;
    z-index:2;
}

</style>
</head>

<body>

<div class="top"></div>
<div class="bottom"></div>

<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#dc2626"
d="M0,160C200,220,400,100,700,160C1000,220,1200,140,1440,180L1440,320L0,320Z">
</path>
</svg>
</div>

<!-- 🌟 WELCOME -->
<div class="welcome" onclick="openLogin()">

<div class="title">
<h1>🚀 PlacementPro</h1>

<p>
A smart platform to manage placements, track applications,
and connect students with companies easily.
</p>

<div class="click-text">Click anywhere to continue</div>
</div>

</div>

<!-- 🔐 LOGIN CARD -->
<div class="card" id="card">

<h2>Login</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>
</form>

<div class="links">
<a href="#">Forgot Password?</a>
<a href="#">Create Account</a>
</div>

</div>

<script>

function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("card").classList.add("active");
}

/* 🔥 REAL 3D EFFECT */
document.addEventListener("mousemove",(e)=>{
    const card=document.getElementById("card");

    if(!card.classList.contains("active")) return;

    let x = (window.innerWidth/2 - e.pageX) / 25;
    let y = (window.innerHeight/2 - e.pageY) / 25;

    card.style.transform =
    `translate(-50%, -50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
