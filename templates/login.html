<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
}

/* SAME BACKGROUND AS BASE */
.bg-top {
    position: absolute;
    width: 100%;
    height: 65%;
    background: #ffffff;
}

.bg-bottom {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 35%;
    background: linear-gradient(135deg, #fecaca, #fb923c);
}

.wave {
    position: absolute;
    top: 60%;
    width: 100%;
}

/* 🌟 WELCOME SCREEN */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    cursor:pointer;
    z-index: 2;
}

.welcome h1 {
    font-size: 48px;
    color: #111827;
}

.welcome p {
    max-width: 400px;
    color: #374151;
}

.click-text {
    margin-top: 20px;
    color: #ef4444;
    font-weight: bold;
}

/* 🔴 LOGIN CARD */
.card {
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);

    width:340px;
    padding:30px;

    background:white;
    border-radius:18px;
    border: 3px solid #ef4444;

    box-shadow: 0 20px 60px rgba(239,68,68,0.3);

    transition:0.5s;
    z-index:3;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #fca5a5;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:8px;
}

/* LINKS */
.links {
    text-align:center;
    margin-top:10px;
}

.links a {
    color:#ef4444;
    font-size:13px;
    display:block;
}

/* 3D EFFECT */
.card:hover {
    transform: translate(-50%,-50%) scale(1.02) rotateX(3deg) rotateY(3deg);
}

</style>
</head>

<body>

<div class="bg-top"></div>
<div class="bg-bottom"></div>

<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#fb923c"
d="M0,160C200,220,400,100,700,160C1000,220,1200,140,1440,180L1440,320L0,320Z">
</path>
</svg>
</div>

<!-- 🌟 WELCOME -->
<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>
A smart platform to manage placements, track applications,
and connect students with companies easily.
</p>
<div class="click-text">Click anywhere to login</div>
</div>

<!-- 🔐 CARD -->
<div class="card" id="loginCard">

<h2>Login</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>
</form>

<div class="links">
<a href="#">Forgot Password?</a>
<a href="#">Create Account</a>
</div>

</div>

<script>

function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("loginCard").classList.add("active");
}

/* 3D mouse movement */
document.addEventListener("mousemove",(e)=>{
    const card=document.getElementById("loginCard");

    if(!card.classList.contains("active")) return;

    let x=(window.innerWidth/2 - e.pageX)/40;
    let y=(window.innerHeight/2 - e.pageY)/40;

    card.style.transform =
    `translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
