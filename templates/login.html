<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    overflow: hidden;
    background: linear-gradient(135deg, #fff7ed, #fb923c);
}

/* WELCOME SCREEN */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    cursor:pointer;
}

.welcome h1 {
    font-size:50px;
}

/* LOGIN CARD */
.card {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:340px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.3);
    backdrop-filter:blur(15px);
    transition:0.5s;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button {
    width:100%;
    padding:12px;
    background:#ea580c;
    color:white;
    border:none;
    border-radius:10px;
}

/* LINKS */
.links {
    text-align:center;
    margin-top:10px;
}

.links a {
    display:block;
    margin-top:5px;
    text-decoration:none;
    font-size:14px;
}

/* HOME BUTTON */
.home-btn {
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
}
</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<!-- WELCOME -->
<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>Click anywhere to continue</p>
</div>

<!-- LOGIN -->
<div class="card" id="loginCard">

<h2>Login</h2>

<form method="post">
{% csrf_token %}

{% if messages %}
{% for message in messages %}
<p style="color:red;text-align:center;">{{ message }}</p>
{% endfor %}
{% endif %}

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<div class="links">
<a href="/password-reset/">Forgot Password?</a>
<a href="/students/register/">Create Account</a>
</div>

</div>

<script>

function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("loginCard").classList.add("active");
}

// 3D EFFECT
document.addEventListener("mousemove",(e)=>{
    const card=document.getElementById("loginCard");

    let x=(window.innerWidth/2 - e.pageX)/25;
    let y=(window.innerHeight/2 - e.pageY)/25;

    card.style.transform=
    `translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
