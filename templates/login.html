<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
}

/* 🔵 LEFT / TOP CLEAN SIDE */
.left {
    position: absolute;
    width: 100%;
    height: 50%;
    background: #e0f2fe; /* soft sky blue */
    top: 0;
}

/* 🔴 BOTTOM RED SIDE */
.right {
    position: absolute;
    width: 100%;
    height: 50%;
    bottom: 0;
    background: linear-gradient(135deg, #fb7185, #f97316);
}

/* 🌊 WAVE SEPARATOR */
.wave {
    position: absolute;
    top: 45%;
    width: 100%;
    z-index: 1;
}

.wave svg {
    width: 100%;
    height: 120px;
    display: block;
}

/* 🚀 TITLE (NO DARK BLUE ANYMORE) */
.title {
    position: absolute;
    top: 12%;
    width: 100%;
    text-align: center;
    font-size: 42px;
    font-weight: bold;
    color: #0f172a;
}

.subtitle {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    color: #334155;
}

/* 🪟 LOGIN CARD (RED BORDER + WHITE INSIDE) */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 340px;
    padding: 30px;

    background: white;
    border-radius: 18px;

    border: 3px solid #ef4444; /* red boundary */
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);

    z-index: 3;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;

    border: 1px solid #fca5a5;
    border-radius: 8px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: #ef4444;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* LINKS */
.links {
    text-align: center;
    margin-top: 10px;
}

.links a {
    display: block;
    color: #ef4444;
    font-size: 13px;
    text-decoration: none;
    margin-top: 5px;
}

/* HOME BUTTON */
.home-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    z-index: 4;
}

</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<!-- SPLIT BACKGROUND -->
<div class="left"></div>
<div class="right"></div>

<!-- 🌊 WAVE -->
<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#fb7185"
d="M0,192L80,186.7C160,181,320,171,480,181.3C640,192,800,224,960,218.7C1120,213,1280,171,1360,149.3L1440,128V320H0Z">
</path>
</svg>
</div>

<!-- TITLE -->
<div class="title">PlacementPro</div>
<div class="subtitle">Login to continue</div>

<!-- LOGIN CARD -->
<div class="card">

<h2 style="text-align:center;">Login</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<div class="links">
<a href="/password-reset/">Forgot Password?</a>
<a href="/students/register/">Create Account</a>
</div>

</div>

</body>
</html>
