<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(to bottom, #ffffff, #e0f2fe);
}

/* WAVE */
body::after {
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:50%;
    background: linear-gradient(135deg, #7dd3fc, #38bdf8);
    border-top-left-radius:50% 20%;
    border-top-right-radius:50% 20%;
}

/* HOME BTN */
.home-btn {
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
}

/* WELCOME */
.welcome {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
}

/* CARD */
.card {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:340px;
    padding:30px;
    border-radius:20px;
    background:white;
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    transition:0.5s;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

input {
    width:100%;
    margin-bottom:10px;
    padding:10px;
}

button {
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
}

.links {
    text-align:center;
    margin-top:10px;
}

</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>Click anywhere to login</p>
</div>

<div class="card" id="card">

<h2>Login</h2>

<form method="post">
{% csrf_token %}
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<div class="links">
<a href="/password-reset/">Forgot Password</a>
<a href="/students/register/">Create Account</a>
</div>

</div>

<script>

function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("card").classList.add("active");
}

/* 3D FIX */
document.addEventListener("mousemove",(e)=>{
    const card=document.getElementById("card");

    if(!card.classList.contains("active")) return;

    let x=(window.innerWidth/2 - e.pageX)/40;
    let y=(window.innerHeight/2 - e.pageY)/40;

    card.style.transform =
    `translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
