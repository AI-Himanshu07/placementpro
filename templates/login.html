{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Login - PlacementPro</title>

<style>

body {
    margin: 0;
    height: 100vh;
    font-family: Arial;

    /* sky top + orange bottom feel */
    background: linear-gradient(to bottom,
        #dbeafe 0%,
        #dbeafe 45%,
        #fdba74 55%,
        #fb923c 100%);
    overflow: hidden;
}

/* ☁️ CLOUDS */
body::before {
    content: "";
    position: absolute;
    top: 0;
    width: 100%;
    height: 45%;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.9) 0 20px, transparent 21px),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.8) 0 25px, transparent 26px),
        radial-gradient(circle at 70% 35%, rgba(255,255,255,0.85) 0 22px, transparent 23px),
        radial-gradient(circle at 90% 25%, rgba(255,255,255,0.7) 0 18px, transparent 19px);
    opacity: 0.8;
    pointer-events: none;
}

/* 🌊 WAVE DIVIDER */
.wave {
    position: absolute;
    top: 42%;
    width: 100%;
}

.wave svg {
    width: 100%;
    height: 80px;
    display: block;
}

/* WELCOME */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:#1e3a8a;
    cursor:pointer;
    z-index:2;
}

.welcome h1 {
    font-size:50px;
}

/* 🔴 LOGIN CARD (soft red glow) */
.card {
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);

    width:340px;
    padding:30px;
    border-radius:20px;

    background: rgba(255, 240, 240, 0.95);
    color:#7f1d1d;

    box-shadow: 0 20px 60px rgba(220,38,38,0.25);

    transition:0.4s;
    z-index:3;
}

.card.active {
    transform:translate(-50%,-50%) scale(1);
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background: rgba(255,255,255,0.7);
}

input::placeholder {
    color:#ef4444;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#dc2626;
    color:white;
}

/* LINKS */
.links {
    text-align:center;
    margin-top:10px;
}

.links a {
    display:block;
    color:#7f1d1d;
    font-size:14px;
    margin-top:5px;
    text-decoration:none;
}

/* HOME BTN */
.home-btn {
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    z-index:4;
}

</style>
</head>

<body>

<a href="/" class="home-btn">🏠 Home</a>

<!-- ☁️ WELCOME -->
<div class="welcome" onclick="openLogin()">
<h1>🚀 PlacementPro</h1>
<p>Welcome — Click to Login</p>
</div>

<!-- 🌊 WAVE -->
<div class="wave">
<svg viewBox="0 0 1440 320">
<path fill="#fdba74"
d="M0,192L80,186.7C160,181,320,171,480,181.3C640,192,800,224,960,218.7C1120,213,1280,171,1360,149.3L1440,128V320H0Z">
</path>
</svg>
</div>

<!-- LOGIN CARD -->
<div class="card" id="loginCard">

<h2>Login</h2>

<form method="post">
{% csrf_token %}

{% if messages %}
{% for message in messages %}
<p style="text-align:center;">{{ message }}</p>
{% endfor %}
{% endif %}

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<div class="links">
<a href="/password-reset/">Forgot Password?</a>
<a href="/students/register/">Create Account</a>
</div>

</div>

<script>

function openLogin(){
    document.querySelector(".welcome").style.display="none";
    document.getElementById("loginCard").classList.add("active");
}

/* 3D EFFECT */
document.addEventListener("mousemove",(e)=>{
    const card=document.getElementById("loginCard");

    let x=(window.innerWidth/2 - e.pageX)/30;
    let y=(window.innerHeight/2 - e.pageY)/30;

    card.style.transform =
    `translate(-50%,-50%) scale(1) rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
